# Subir a partir da raiz do repo:
#   docker compose -f VERSAO-c/docker-compose.yml -p versao-c up --build
#
# Benchmark k6 (rede do container lb — ver README):
#   cd test && k6 run test.js  (com --network container:versao-c-lb-1)

services:
  lb:
    image: ghcr.io/sl4ureano/rinha2026:megazord-c
    pull_policy: always
    command: ["/app/lb"]
    environment:
      - LB_PORT=9999
      - API1_SOCKET=/tmp/sockets/api1.sock
      - API2_SOCKET=/tmp/sockets/api2.sock
      - CHANNELS_PER_API=2
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    volumes:
      - sockets:/tmp/sockets
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 10M
    logging:
      driver: none
    networks:
      - rinha

  api1:
    image: ghcr.io/sl4ureano/rinha2026:megazord-c
    pull_policy: always
    environment:
      - FD_PASS=1
      - CTRL_SOCK=/tmp/sockets/api1.sock
      - PORT=8080
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 1s
      timeout: 1s
      retries: 30
      start_period: 15s
    volumes:
      - sockets:/tmp/sockets
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 170M
    logging:
      driver: none
    networks:
      - rinha

  api2:
    image: ghcr.io/sl4ureano/rinha2026:megazord-c
    pull_policy: always
    network_mode: "none"
    environment:
      - FD_PASS=1
      - CTRL_SOCK=/tmp/sockets/api2.sock
      - PORT=8080
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 1s
      timeout: 1s
      retries: 30
      start_period: 15s
    volumes:
      - sockets:/tmp/sockets
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 170M
    logging:
      driver: none

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m,mode=0777

networks:
  rinha:
    driver: bridge
