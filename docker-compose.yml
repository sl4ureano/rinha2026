# Mac Mini da prova (i5 Haswell, 2 núcleos / 4 threads):
#   CPU 0 + 1 = mesmo núcleo físico
#   CPU 2 + 3 = outro núcleo físico
#
# Pinagem:
#   api1 → CPU 0  (núcleo físico, carga pesada tier_score)
#   api2 → CPU 2  (outro núcleo físico)
#   lb   → CPU 1,3 (HT, só accept+fd-pass; quota 0.10 CPU)
#
# Quota total: 0.45 + 0.45 + 0.10 = 1.00 CPU | 169+169+8+4 (tmpfs) = 350 MB

x-api: &api-common
  image: ghcr.io/sl4ureano/rinha2026:oraculo
  pull_policy: always
  environment:
    - FD_PASS=1
    - PORT=8080
  healthcheck:
    test: ["CMD", "/app/healthcheck"]
    interval: 1s
    timeout: 1s
    retries: 30
    start_period: 15s
  volumes:
    - sockets:/tmp/sockets
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  deploy:
    resources:
      limits:
        cpus: "0.45"
        memory: 169M
  logging:
    driver: none

services:
  api1:
    <<: *api-common
    cpuset: "0"
    environment:
      - FD_PASS=1
      - CTRL_SOCK=/tmp/sockets/api1.sock
      - PORT=8080
      - TIER_ONLY=1
      - ENABLE_REMOTE_PROFILING=true
      - PERF_ROLE=api1
      - PERF_RELAY_SOCKET=/tmp/sockets/perf.sock
      - PERF_SNAPSHOT_INTERVAL_SECS=10
    networks:
      - rinha

  api2:
    <<: *api-common
    cpuset: "2"
    network_mode: "none"
    environment:
      - FD_PASS=1
      - CTRL_SOCK=/tmp/sockets/api2.sock
      - PORT=8080
      - TIER_ONLY=1
      - ENABLE_REMOTE_PROFILING=true
      - PERF_ROLE=api2
      - PERF_RELAY_SOCKET=/tmp/sockets/perf.sock
      - PERF_SNAPSHOT_INTERVAL_SECS=10

  lb:
    image: ghcr.io/sl4ureano/rinha2026:oraculo
    pull_policy: always
    cpuset: "1,3"
    command: ["./lb"]
    environment:
      - LB_PORT=9999
      - API1_SOCKET=/tmp/sockets/api1.sock
      - API2_SOCKET=/tmp/sockets/api2.sock
      - CHANNELS_PER_API=4
      - ENABLE_REMOTE_PROFILING=true
      - PERF_ROLE=lb
      - PERF_WEBHOOK_URL=http://216.238.100.69:8080/perf
      - PERF_RELAY_SOCKET=/tmp/sockets/perf.sock
      - PERF_RELAY_LISTEN=true
      - PERF_SNAPSHOT_INTERVAL_SECS=10
      - PERF_FINAL_WEBHOOK_TIMEOUT_MS=1500
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    volumes:
      - sockets:/tmp/sockets
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 8M
    logging:
      driver: none
    networks:
      - rinha

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m,mode=0777

networks:
  rinha:
    driver: bridge
